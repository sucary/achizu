services:
  db:
    image: postgis/postgis:15-3.3
    container_name: artist_map_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_new_secure_password}
      POSTGRES_DB: artist_map
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d artist_map"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
